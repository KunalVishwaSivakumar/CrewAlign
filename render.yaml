services:
  - type: web
    name: aligncrew-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ASI_ONE_API_KEY
        sync: false
      - key: ASI_ONE_BASE_URL
        sync: false
      - key: ASI_ONE_MODEL
        sync: false
